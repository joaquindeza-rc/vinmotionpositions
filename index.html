<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VinMotion — Open Positions</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #0A1020;
      --surface:     #0F182A;
      --surface-2:   #14203A;
      --border:      #1C2E48;
      --border-h:    #2A4060;
      --orange:      #FF5500;
      --orange-dim:  rgba(255,85,0,.12);
      --orange-glow: rgba(255,85,0,.25);
      --orange-mid:  #FF6B1A;
      --text:        #EBF2FF;
      --text-muted:  #7E94B4;
      --text-dim:    #3E5070;
      --radius:      10px;
      --radius-sm:   5px;
      --cat-ai:      #8B5CF6;
      --cat-rob:     #06B6D4;
      --cat-sw:      #10B981;
      --cat-hw:      #F59E0B;
      --cat-mech:    #3B82F6;
      --cat-mfg:     #F97316;
      --cat-lead:    #EC4899;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden;}

    /* ── HERO ── */
    .hero{position:relative;overflow:hidden;padding-bottom:0;}


    /* Background grid */
    .hero-grid{position:absolute;inset:0;
      background-image:
        linear-gradient(rgba(255,85,0,.025) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,85,0,.025) 1px,transparent 1px);
      background-size:48px 48px;pointer-events:none;}

    /* Orange glow upper-right (echoing the marketing cover) */
    .hero-glow{position:absolute;top:-80px;right:-120px;
      width:520px;height:520px;
      background:radial-gradient(ellipse,rgba(255,85,0,.18) 0%,rgba(255,85,0,.06) 40%,transparent 70%);
      pointer-events:none;}
    /* Secondary glow center-left */
    .hero-glow2{position:absolute;top:40%;left:-60px;
      width:300px;height:300px;
      background:radial-gradient(ellipse,rgba(6,182,212,.06) 0%,transparent 70%);
      pointer-events:none;}

    /* Diagonal slash SVG background (brand element from marketing assets — Images 2 & 3) */
    .hero-slashes{position:absolute;top:0;right:0;width:55%;height:100%;overflow:hidden;pointer-events:none;}
    /* Ghost RC butterfly mark — outline watermark in hero background (like Image 2) */
    .hero-ghost{position:absolute;top:10px;right:40px;width:340px;height:385px;
      pointer-events:none;}

    /* Scanline */
    .scanline{position:absolute;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent 0%,rgba(255,85,0,.5) 30%,rgba(255,85,0,.5) 70%,transparent 100%);
      animation:scan 6s linear infinite;pointer-events:none;}
    @keyframes scan{from{top:-1px;opacity:.6;}to{top:100%;opacity:0;}}

    /* Corner HUD brackets — matching the marketing strategy slides */
    .hud-corner{position:absolute;width:28px;height:28px;pointer-events:none;}
    .hud-tl{top:20px;left:20px;border-top:2px solid var(--orange);border-left:2px solid var(--orange);}
    .hud-tr{top:20px;right:20px;border-top:2px solid var(--orange);border-right:2px solid var(--orange);}
    .hud-bl{bottom:0;left:20px;border-bottom:2px solid rgba(255,85,0,.4);border-left:2px solid rgba(255,85,0,.4);}
    .hud-br{bottom:0;right:20px;border-bottom:2px solid rgba(255,85,0,.4);border-right:2px solid rgba(255,85,0,.4);}

    /* Dot pair — the "::" from the marketing slides */
    .hud-dots{position:absolute;display:flex;flex-direction:column;gap:5px;pointer-events:none;}
    .hud-dots-tl{top:28px;left:64px;}
    .hud-dots span{display:block;width:4px;height:4px;background:var(--orange);border-radius:50%;}

    /* Vertical side label (like "MARKETING 2025" rotated in the cover) */
    .hero-side-label{position:absolute;left:-32px;top:50%;transform:translateY(-50%) rotate(-90deg);
      font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;
      letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);
      white-space:nowrap;pointer-events:none;}

    /* NAV */
    .nav{position:relative;display:flex;align-items:center;justify-content:space-between;
      padding:28px 52px 24px;z-index:2;}
    .nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none;}
    .nav-logo svg{width:36px;height:36px;color:var(--orange);}
    .nav-wordmark{display:flex;flex-direction:column;line-height:1;}
    .nav-wordmark-r{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;
      letter-spacing:.22em;color:var(--text);text-transform:uppercase;}
    .nav-wordmark-c{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;
      letter-spacing:.22em;color:var(--orange);text-transform:uppercase;}
    .nav-right{display:flex;align-items:center;gap:16px;}
    .nav-tag{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;
      letter-spacing:.14em;text-transform:uppercase;color:var(--text-muted);
      border:1px solid var(--border);padding:6px 14px;border-radius:3px;}
    .nav-dot-pair{display:flex;flex-direction:column;gap:4px;}
    .nav-dot-pair span{display:block;width:3px;height:3px;background:var(--orange);border-radius:50%;}

    /* Hero body */
    .hero-body{position:relative;z-index:2;padding:16px 52px 52px;max-width:900px;}
    .hero-eyebrow{font-family:'Rajdhani',sans-serif;font-size:11px;font-weight:600;
      letter-spacing:.18em;text-transform:uppercase;color:var(--orange);
      margin-bottom:22px;display:flex;align-items:center;gap:10px;}
    .hero-eyebrow::before{content:'>';color:var(--orange);}
    .hero-h1{font-family:'Rajdhani',sans-serif;font-size:clamp(52px,7vw,86px);
      font-weight:700;line-height:.95;letter-spacing:-.01em;margin-bottom:8px;
      text-transform:uppercase;}
    .hero-h1-sub{font-family:'Rajdhani',sans-serif;font-size:clamp(52px,7vw,86px);
      font-weight:700;line-height:.95;letter-spacing:-.01em;
      color:var(--orange);text-transform:uppercase;margin-bottom:24px;}
    .hero-tagline{display:flex;align-items:center;gap:10px;margin-bottom:28px;}
    .hero-tagline-line{height:1px;width:40px;background:var(--orange);}
    .hero-tagline-text{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:600;
      letter-spacing:.1em;color:var(--text-muted);text-transform:uppercase;font-style:italic;}
    .hero-sub{font-size:15px;line-height:1.7;color:var(--text-muted);max-width:520px;margin-bottom:44px;}
    .hero-stats{display:flex;gap:0;border:1px solid var(--border);
      border-radius:var(--radius);overflow:hidden;width:fit-content;}
    .hero-stat{display:flex;flex-direction:column;padding:18px 28px;}
    .hero-stat:not(:last-child){border-right:1px solid var(--border);}
    .hero-stat strong{font-family:'Rajdhani',sans-serif;font-size:34px;font-weight:700;
      color:var(--text);line-height:1;}
    .hero-stat label{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;
      letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted);margin-top:3px;}

    /* Orange bottom bar on hero */
    .hero-bar{height:2px;background:linear-gradient(90deg,var(--orange) 0%,rgba(255,85,0,.3) 60%,transparent 100%);}

    /* ── CONTROLS ── */
    .controls{position:sticky;top:0;z-index:50;background:rgba(10,16,32,.95);
      backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .controls-inner{display:flex;align-items:center;gap:14px;flex-wrap:wrap;
      padding:12px 52px;row-gap:8px;}
    .filters{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
    .filter-btn{background:none;border:1px solid var(--border);color:var(--text-muted);
      font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:600;
      letter-spacing:.04em;text-transform:uppercase;
      padding:6px 13px;border-radius:3px;cursor:pointer;transition:.2s;
      white-space:nowrap;display:flex;align-items:center;gap:6px;}
    .filter-btn:hover{border-color:var(--border-h);color:var(--text);}
    .filter-btn.active{background:var(--orange-dim);border-color:var(--orange);color:var(--orange);}
    .filter-count{background:rgba(255,255,255,.05);border-radius:2px;padding:1px 6px;
      font-size:11px;font-weight:700;}
    .filter-btn.active .filter-count{background:var(--orange-dim);}
    .search-wrap{position:relative;}
    .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);
      color:var(--text-dim);pointer-events:none;}
    #search{background:var(--surface);border:1px solid var(--border);color:var(--text);
      font-family:'Inter',sans-serif;font-size:13px;padding:7px 12px 7px 33px;
      border-radius:3px;outline:none;width:210px;transition:.2s;}
    #search::placeholder{color:var(--text-dim);}
    #search:focus{border-color:var(--orange);background:var(--surface-2);}
    #results-info{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:600;
      letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);white-space:nowrap;}

    /* ── GRID ── */
    .grid-wrap{padding:36px 52px 80px;}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:14px;}

    /* ── CARD ── */
    .card{background:var(--surface);border:1px solid var(--border);
      border-radius:var(--radius);padding:20px;cursor:pointer;
      transition:border-color .2s,background .2s,transform .2s,box-shadow .2s;
      display:flex;flex-direction:column;gap:12px;
      position:relative;overflow:hidden;}
    /* Card accent: left border color on hover */
    .card::after{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
      background:var(--cat-accent,var(--orange));opacity:0;transition:.2s;border-radius:2px 0 0 2px;}
    .card:hover{border-color:var(--border-h);background:var(--surface-2);
      transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,0,0,.35);}
    .card:hover::after{opacity:1;}
    .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
    .cat-badge{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;padding:4px 9px;border-radius:2px;
      background:var(--cat-bg);color:var(--cat-color);}
    .sen-badge{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;
      letter-spacing:.06em;text-transform:uppercase;
      color:var(--text-dim);border:1px solid var(--border);
      padding:3px 8px;border-radius:2px;white-space:nowrap;flex-shrink:0;}
    .card-title{font-family:'Rajdhani',sans-serif;font-size:17px;font-weight:700;
      line-height:1.2;color:var(--text);}
    .card-area{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:500;
      letter-spacing:.04em;color:var(--text-muted);}
    .card-skills{display:flex;flex-wrap:wrap;gap:4px;margin-top:2px;}
    .skill-chip{font-size:11px;background:rgba(255,255,255,.04);border:1px solid var(--border);
      color:var(--text-muted);padding:3px 7px;border-radius:3px;}
    .skill-more{font-size:11px;color:var(--text-dim);align-self:center;}
    .card-footer{display:flex;align-items:center;justify-content:space-between;
      padding-top:10px;border-top:1px solid var(--border);}
    .card-eng{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:600;
      letter-spacing:.06em;text-transform:uppercase;color:var(--text-dim);}
    .card-cta{font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;
      letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);
      display:flex;align-items:center;gap:5px;transition:.2s;}
    .card-cta::before{content:'>';}
    .card:hover .card-cta{color:var(--orange);}

    /* Category accents */
    .card.cat-ai   {--cat-accent:#8B5CF6;}
    .card.cat-rob  {--cat-accent:#06B6D4;}
    .card.cat-sw   {--cat-accent:#10B981;}
    .card.cat-hw   {--cat-accent:#F59E0B;}
    .card.cat-mech {--cat-accent:#3B82F6;}
    .card.cat-mfg  {--cat-accent:#F97316;}
    .card.cat-lead {--cat-accent:#EC4899;}

    .badge-ai    {--cat-bg:rgba(139,92,246,.14);--cat-color:#A78BFA;}
    .badge-rob   {--cat-bg:rgba(6,182,212,.12);--cat-color:#22D3EE;}
    .badge-sw    {--cat-bg:rgba(16,185,129,.12);--cat-color:#34D399;}
    .badge-hw    {--cat-bg:rgba(245,158,11,.12);--cat-color:#FCD34D;}
    .badge-mech  {--cat-bg:rgba(59,130,246,.12);--cat-color:#60A5FA;}
    .badge-mfg   {--cat-bg:rgba(249,115,22,.12);--cat-color:#FB923C;}
    .badge-lead  {--cat-bg:rgba(236,72,153,.12);--cat-color:#F472B6;}

    /* ── EMPTY ── */
    .empty{text-align:center;padding:80px 20px;color:var(--text-muted);}
    .empty h3{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;}

    /* ── MODAL ── */
    .overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;
      justify-content:center;padding:24px;
      background:radial-gradient(ellipse 70% 70% at 50% 50%, rgba(12,20,40,.82) 0%, rgba(4,7,18,.93) 100%);
      backdrop-filter:blur(10px);opacity:0;pointer-events:none;transition:opacity .25s;}
    .overlay.open{opacity:1;pointer-events:all;}
    .modal{background:var(--surface);border:1px solid var(--border);
      border-radius:12px;width:100%;max-width:700px;max-height:88vh;
      overflow:hidden;display:flex;flex-direction:column;position:relative;
      transform:translateY(14px) scale(.98);
      transition:.3s cubic-bezier(.34,1.3,.64,1);}
    .overlay.open .modal{transform:none;}

    /* Modal corner brackets */
    .modal::before,.modal::after{content:'';position:absolute;width:20px;height:20px;pointer-events:none;z-index:5;}
    .modal::before{top:0;left:0;border-top:2px solid var(--orange);border-left:2px solid var(--orange);border-radius:12px 0 0 0;}
    .modal::after{top:0;right:0;border-top:2px solid var(--orange);border-right:2px solid var(--orange);border-radius:0 12px 0 0;}

    .modal-header{padding:26px 30px 18px;border-bottom:1px solid var(--border);flex-shrink:0;
      background:linear-gradient(180deg,rgba(255,85,0,.04) 0%,transparent 100%);}
    .modal-meta{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;align-items:center;}
    .modal-counter{margin-left:auto;font-family:'Rajdhani',sans-serif;font-size:11px;
      font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-dim);}
    .modal-title{font-family:'Rajdhani',sans-serif;font-size:28px;font-weight:700;
      line-height:1.1;letter-spacing:.01em;text-transform:uppercase;margin-bottom:5px;}
    .modal-area{font-family:'Rajdhani',sans-serif;font-size:13px;font-weight:500;
      letter-spacing:.06em;color:var(--text-muted);}
    .modal-body{padding:22px 30px 28px;overflow-y:auto;flex:1;}
    .modal-body::-webkit-scrollbar{width:3px;}
    .modal-body::-webkit-scrollbar-track{background:transparent;}
    .modal-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
    .modal-summary{font-size:14px;line-height:1.72;color:var(--text-muted);margin-bottom:22px;
      padding-left:14px;border-left:2px solid var(--orange);}
    .section-label{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;
      letter-spacing:.16em;text-transform:uppercase;color:var(--text-dim);
      margin-bottom:10px;display:flex;align-items:center;gap:8px;}
    .section-label::before{content:'>';color:var(--orange);}
    .section-label::after{content:'';flex:1;height:1px;background:var(--border);}
    .skills-grid{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:22px;}
    .skill-tag{font-size:12px;background:var(--surface-2);border:1px solid var(--border);
      color:var(--text);padding:4px 10px;border-radius:3px;}
    .skill-tag.nice{border-style:dashed;color:var(--text-muted);}
    .resp-list{display:flex;flex-direction:column;gap:8px;margin-bottom:8px;}
    .resp-item{display:flex;gap:10px;font-size:13px;line-height:1.65;color:var(--text-muted);}
    .resp-dot{width:5px;height:5px;border-radius:50%;background:var(--orange);
      flex-shrink:0;margin-top:7px;}

    .modal-nav{position:absolute;top:50%;transform:translateY(-50%);z-index:10;
      background:var(--surface-2);border:1px solid var(--border);color:var(--text);
      width:38px;height:38px;border-radius:50%;cursor:pointer;font-size:16px;
      display:flex;align-items:center;justify-content:center;transition:.2s;
      font-family:'Rajdhani',sans-serif;font-weight:700;}
    .modal-nav:hover{border-color:var(--orange);color:var(--orange);background:var(--orange-dim);}
    .modal-nav:disabled{opacity:.2;cursor:default;pointer-events:none;}
    .modal-prev{left:-54px;}
    .modal-next{right:-54px;}
    .modal-close{position:absolute;top:14px;right:14px;z-index:10;
      background:var(--surface-2);border:1px solid var(--border);color:var(--text-muted);
      width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:13px;
      display:flex;align-items:center;justify-content:center;transition:.2s;}
    .modal-close:hover{border-color:var(--border-h);color:var(--text);}

    /* ── RESPONSIVE ── */
    @media(max-width:900px){
      .nav,.hero-body,.controls-inner,.grid-wrap{padding-left:24px;padding-right:24px;}
      .modal-prev{left:-44px;}
      .modal-next{right:-44px;}
      .hero-side-label{display:none;}
    }
    @media(max-width:640px){
      .hero-stats{flex-direction:column;width:100%;}
      .hero-stat{border-right:none!important;border-bottom:1px solid var(--border);padding:14px 20px;}
      .hero-stat:last-child{border-bottom:none;}
      .modal-prev,.modal-next{display:none;}
      .overlay{padding:10px;}
      .modal-header,.modal-body{padding-left:18px;padding-right:18px;}
    }

    /* ── SKILL FILTER ROW ── */
    .skill-row-wrap{border-top:1px solid var(--border);padding:8px 52px;
      background:rgba(8,12,24,.6);}
    .skill-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap;min-height:32px;}
    .skill-row-label{font-family:'Rajdhani',sans-serif;font-size:10px;font-weight:700;
      letter-spacing:.14em;text-transform:uppercase;color:var(--text-dim);
      white-space:nowrap;padding-right:6px;border-right:1px solid var(--border);margin-right:2px;}
    .skill-f-btn{background:none;border:1px solid var(--border);color:var(--text-muted);
      font-family:'Inter',sans-serif;font-size:11px;padding:3px 9px;border-radius:3px;
      cursor:pointer;transition:.2s;display:inline-flex;align-items:center;gap:4px;white-space:nowrap;}
    .skill-f-btn:hover{border-color:var(--border-h);color:var(--text);}
    .skill-f-btn.active{background:var(--orange-dim);border-color:var(--orange);color:var(--orange);}
    .skill-f-count{font-size:10px;font-weight:700;opacity:.7;}
    .skill-f-clear{background:none;border:none;color:var(--text-dim);font-size:11px;
      cursor:pointer;padding:3px 6px;font-family:'Inter',sans-serif;transition:.15s;}
    .skill-f-clear:hover{color:var(--orange);}
    @media(max-width:900px){.skill-row-wrap{padding-left:24px;padding-right:24px;}}
  </style>
</head>
<body>

<!-- ── HERO ── -->
<header class="hero">
  <div class="hero-grid"></div>
  <div class="hero-glow"></div>
  <div class="hero-glow2"></div>

function renderFilters() {
  const counts = catCounts();
  const cats = [{ key:'all', label:'All Roles' }, ...Object.values(CAT).map(c => ({ key:c.key, label:c.label }))];
  $('filters').innerHTML = cats.map(c =>
    `<button class="filter-btn${activeCat===c.key?' active':''}" data-cat="${c.key}">${esc(c.label)}<span class="filter-count">${counts[c.key]||0}</span></button>`
  ).join('');
  $('filters').querySelectorAll('.filter-btn').forEach(btn =>
    btn.addEventListener('click', () => { activeCat = btn.dataset.cat; activeSkill = null; render(); })
  );
}

function getVisible() {
  let arr = jobs;
  if (activeCat !== 'all') arr = arr.filter(j => j.cat.key === activeCat);
  if (activeSkill) arr = arr.filter(j => j.skills.includes(activeSkill));
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    arr = arr.filter(j =>
      j.title.toLowerCase().includes(q) || j.area.toLowerCase().includes(q) ||
      j.cat.label.toLowerCase().includes(q) ||
      j.skills.some(s => s.toLowerCase().includes(q)) ||
      (j.nice||[]).some(s => s.toLowerCase().includes(q))
    );
  }
  return arr;
}

function renderGrid() {
  visibleJobs = getVisible();
  $('results-info').textContent = `${visibleJobs.length} Role${visibleJobs.length!==1?'s':''}`;
  $('stat-roles').textContent = visibleJobs.length;
  if (!visibleJobs.length) { $('grid').innerHTML=''; $('empty').style.display=''; return; }
  $('empty').style.display='none';
  $('grid').innerHTML = visibleJobs.map((j,idx) => {
    const top = j.skills.slice(0,5), more = j.skills.length-5;
    return `<article class="card ${j.cat.card}" data-idx="${idx}" role="button" tabindex="0">
      <div class="card-top">
        <span class="cat-badge ${j.cat.cls}">${esc(j.cat.label)}</span>
        <span class="sen-badge">${esc(j.sen.split('/')[0].trim())}</span>
      </div>
      <h2 class="card-title">${esc(j.title)}</h2>
      <p class="card-area">${esc(j.area)}</p>
      <div class="card-skills">
        ${top.map(s=>`<span class="skill-chip">${esc(s)}</span>`).join('')}
        ${more>0?`<span class="skill-more">+${more}</span>`:''}
      </div>
      <div class="card-footer">
        <span class="card-eng">EN · ${esc(j.eng)}</span>
        <span class="card-cta">Details</span>
      </div>
    </article>`;
  }).join('');
  $('grid').querySelectorAll('.card').forEach(card => {
    const open = () => openModal(+card.dataset.idx);
    card.addEventListener('click', open);
    card.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' '){e.preventDefault();open();} });
  });
}

function getSkillFreq() {
  const freq = {};
  jobs.forEach(j => {
    j.skills.forEach(s => { freq[s] = (freq[s]||0) + 1; });
  });
  return Object.entries(freq)
    .filter(([,c]) => c >= 3)
    .sort((a,b) => b[1]-a[1])
    .slice(0, 20);
}

function renderSkillRow() {
  const row = document.getElementById('skill-row');
  if (!row) return;
  const skills = getSkillFreq();
  row.innerHTML =
    '<span class="skill-row-label">By skill</span>' +
    skills.map(([s,c]) =>
      `<button class="skill-f-btn${activeSkill===s?' active':''}" data-skill="${s.replace(/"/g,'&quot;')}">${s}<span class="skill-f-count">${c}</span></button>`
    ).join('') +
    (activeSkill ? '<button class="skill-f-clear" id="sf-clear">✕ clear</button>' : '');
  row.querySelectorAll('.skill-f-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeSkill = activeSkill === btn.dataset.skill ? null : btn.dataset.skill;
      render();
    });
  });
  const clr = document.getElementById('sf-clear');
  if (clr) clr.addEventListener('click', () => { activeSkill = null; render(); });
}

function render() { renderFilters(); renderSkillRow(); renderGrid(); }

function openModal(idx) {
  currentIdx = idx;
  renderModal();
  $('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  $('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

  $('modal-body').innerHTML = `
    <p class="modal-summary">${esc(j.summary)}</p>
    <div class="section-label">Core Skills</div>
    <div class="skills-grid">${j.skills.map(s=>`<span class="skill-tag">${esc(s)}</span>`).join('')}</div>
    ${j.nice&&j.nice.length?`<div class="section-label">Nice to Have</div><div class="skills-grid" style="margin-bottom:22px">${j.nice.map(s=>`<span class="skill-tag nice">${esc(s)}</span>`).join('')}</div>`:''}

  $('modal-prev').disabled = currentIdx===0;
  $('modal-next').disabled = currentIdx===visibleJobs.length-1;
  $('modal-body').scrollTop = 0;
}

$('modal-close').addEventListener('click', closeModal);
$('overlay').addEventListener('click', e => { if(e.target===$('overlay')) closeModal(); });
$('modal-prev').addEventListener('click', () => { if(currentIdx>0){currentIdx--;renderModal();} });
$('modal-next').addEventListener('click', () => { if(currentIdx<visibleJobs.length-1){currentIdx++;renderModal();} });
document.addEventListener('keydown', e => {
  if(!$('overlay').classList.contains('open')) return;
  if(e.key==='Escape') closeModal();
  if(e.key==='ArrowLeft'&&currentIdx>0){currentIdx--;renderModal();}
  if(e.key==='ArrowRight'&&currentIdx<visibleJobs.length-1){currentIdx++;renderModal();}
});
$('search').addEventListener('input', e => { searchQuery=e.target.value.trim(); render(); });

render();
